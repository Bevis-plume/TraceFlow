# Larger 256x256 DiT-B variant for stronger runs.
autoencoder:
  latent_channels: 4
  latent_size: 32
model:
  preset: DiT-B
  latent_channels: 4
  latent_size: 32
  patch_size: 2
  hidden_size: 768
  depth: 12
  num_heads: 12
  mlp_ratio: 4.0
  dropout: 0.0
  class_conditional: false
  num_classes: null
sampling:
  sampler: euler
  steps: 50
  num_samples: 16
smoke:
  image_size: 64
  batch_size: 2
  latent_channels: 4
  latent_size: 8
  model_preset: DiT-XS
  steps: 2
