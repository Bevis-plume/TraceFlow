# Medium CUDA pilot.
training:
  batch_size: 16
  grad_accum_steps: 4
  num_steps: 20000
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 2000
  ema_decay: 0.9999
  mixed_precision: bf16
  log_interval: 50
  sample_interval: 2500
  save_interval: 20000
  checkpoint_dir: checkpoints/flow_transformer
