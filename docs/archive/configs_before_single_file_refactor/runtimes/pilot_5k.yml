# First CUDA pilot.
training:
  batch_size: 16
  grad_accum_steps: 4
  num_steps: 5000
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 500
  ema_decay: 0.9999
  mixed_precision: bf16
  log_interval: 50
  sample_interval: 1000
  save_interval: 5000
  checkpoint_dir: checkpoints/flow_transformer
