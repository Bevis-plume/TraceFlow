# =============================================================================
# TraceFlow — CUDA Experiment: Baseline DiT-B (256x256, diffusers VAE)
# =============================================================================
# Optional larger-model variant for higher-capacity CUDA runs.
# Not used by the default experiment runner.
# =============================================================================

project:
  name: traceflow-cuda-baseline-256-ditb
  seed: 42
  device: cuda
  output_dir: outputs/flow_transformer

data:
  name: imagefolder
  root: ./data/images_256
  image_size: 256
  num_workers: 8
  pin_memory: true
  download: false

autoencoder:
  backend: diffusers
  pretrained_model_name_or_path: stabilityai/sd-vae-ft-mse
  freeze: true
  latent_channels: 4
  latent_size: 32
  scaling_factor: 0.18215
  base_channels: 64

model:
  preset: DiT-B
  latent_channels: 4
  latent_size: 32
  patch_size: 2
  hidden_size: 768
  depth: 12
  num_heads: 12
  mlp_ratio: 4.0
  dropout: 0.0
  class_conditional: false
  num_classes: null

training:
  batch_size: 8
  grad_accum_steps: 8
  num_steps: 400000
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 5000
  ema_decay: 0.9999
  mixed_precision: bf16
  log_interval: 100
  sample_interval: 5000
  save_interval: 10000
  checkpoint_dir: checkpoints/flow_transformer

sampling:
  sampler: euler
  steps: 50
  num_samples: 16

smoke:
  image_size: 64
  batch_size: 2
  latent_channels: 4
  latent_size: 8
  model_preset: DiT-XS
  steps: 2

security:
  latent_transform:
    type: identity
    secret_key: UNUSED_FOR_IDENTITY
    block_size: 16
    bias_scale: 0.1

watermark:
  enabled: false