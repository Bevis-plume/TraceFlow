# =============================================================================
# Trackable Latent Diffusion — Default Configuration
# =============================================================================

project:
  name: "trackable_latent_diffusion"
  seed: 42
  device: "cuda"  # "cuda" or "cpu"

# -----------------------------------------------------------------------------
# Dataset
# -----------------------------------------------------------------------------
data:
  name: "cifar10"
  root: "./data"
  image_size: 32
  num_workers: 4
  pin_memory: true

# -----------------------------------------------------------------------------
# VAE  (Encoder: 3x32x32 -> 4x8x8,  Decoder: 4x8x8 -> 3x32x32)
# -----------------------------------------------------------------------------
vae:
  in_channels: 3
  latent_channels: 4       # C in z ∈ R^{C×H_z×W_z}
  latent_spatial: 8        # H_z = W_z = 8
  base_channels: 64
  kl_weight: 1.0e-4        # β for β-VAE KL term

# -----------------------------------------------------------------------------
# UNet  (operates in permuted latent space z' ∈ R^{4×8×8})
# -----------------------------------------------------------------------------
unet:
  in_channels: 4
  model_channels: 64
  channel_mult: [1, 2, 2]
  num_res_blocks: 2
  time_embed_dim: 128
  dropout: 0.1

# -----------------------------------------------------------------------------
# Diffusion Schedule
# -----------------------------------------------------------------------------
diffusion:
  timesteps: 1000
  beta_start: 1.0e-4
  beta_end: 0.02
  schedule: "linear"       # "linear" | "cosine"

# -----------------------------------------------------------------------------
# Watermarker  (MLP: flatten(z') -> 64-bit copyright bitstream)
# z' has dim = C * H_z * W_z = 4 * 8 * 8 = 256
# -----------------------------------------------------------------------------
watermarker:
  input_dim: 256           # = latent_channels * latent_spatial^2
  hidden_dims: [128, 64]
  output_dim: 64           # target watermark bit-length |w|
  block_size: 16           # block-coded watermark: 16 blocks × 4 bits/block
  dropout: 0.1

# -----------------------------------------------------------------------------
# LatentPermuter  (crypto module, key K controls block-wise M_K and β_K)
# z' = M_K(z) + β_K
# -----------------------------------------------------------------------------
permuter:
  secret_key: "CHANGE_ME_BEFORE_EXPERIMENT"  # NEVER commit real key to VCS
  block_size: 16          # keyed orthogonal mixing block size
  bias_scale: 0.1          # scale of the additive bias β_K ~ U(-scale, scale)

# -----------------------------------------------------------------------------
# Training
# -----------------------------------------------------------------------------
training:
  batch_size: 64
  num_epochs: 100
  learning_rate: 2.0e-4
  weight_decay: 1.0e-5
  grad_clip_norm: 1.0
  lambda_wm: 1.0           # λ in L_total = L_diffusion + λ·L_wm
  log_interval: 50         # steps
  save_interval: 10        # epochs
  checkpoint_dir: "./checkpoints"

# -----------------------------------------------------------------------------
# Attack (DLG / gradient inversion)
# -----------------------------------------------------------------------------
attack:
  optimizer: "lbfgs"       # "lbfgs" | "adam"
  max_iter: 300
  lr: 0.01
  dummy_init: "random"     # "random" | "zeros"
  output_dir: "./attack_outputs"

# -----------------------------------------------------------------------------
# Evaluation
# -----------------------------------------------------------------------------
eval:
  checkpoint_path: "./checkpoints/best.pt"
  attack_image_dir: "./attack_outputs"
  results_dir: "./results"
